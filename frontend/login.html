<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Supermarket Login</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="login-container">

        <div class="login-box">

            <h1>Supermarket System</h1>

            <form id="loginForm">

                <input 
                    type="email" 
                    id="email"
                    placeholder="Enter Email"
                    required
                >

                <input 
                    type="password" 
                    id="password"
                    placeholder="Enter Password"
                    required
                >

                <button type="submit">
                    Login
                </button>

            </form>

            <p id="message"></p>

        </div>

    </div>

    <script src="js/login.js"></script>

</body>
</html>
